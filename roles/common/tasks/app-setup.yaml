- name: create user
  ansible.builtin.user:
    name: roboshop
    system: yes
    shell: /sbin/nologin
    home: /app
    comment: "roboshop system user"
- name: ansible dete folder
  ansible.builtin.file:
    path: /app
    state: absent
- name: create directory
  ansible.builtin.file:
    path: /app
    state: directory
- name: delete the downloaded file
  ansible.builtin.file:
    path: /tmp/{{ components }}.zip
    state: absent   
- name: download the application
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ components }}-v3.zip  
    dest: /tmp/"{{ components }}".zip
- name: ansible unzip file
  ansible.builtin.unarchive:
    src:  /tmp/{{ components }}.zip
    dest: /app
    remote_src: yes
 